<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- SEO Meta Tags -->
    <title>FUTUNO - Global AI Automation Agency</title>
    <meta name="description" content="FUTUNO is an elite AI Automation Agency. We build autonomous agent workflows, custom LLM integrations, and neural strategy solutions for enterprises worldwide." />
    <meta name="keywords" content="AI automation, autonomous agents, LLM integration, workflow automation, enterprise AI, neural networks" />
    <meta name="author" content="FUTUNO" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    
    <!-- OpenGraph Tags -->
    <meta property="og:title" content="FUTUNO - Global AI Automation Agency" />
    <meta property="og:description" content="Automating the Future of Work. Elite AI automation solutions for enterprises worldwide." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://futuno.ai" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="FUTUNO" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FUTUNO - AI Automation Agency" />
    <meta name="twitter:description" content="Automating the Future of Work with AI." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://futuno.ai" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- JSON-LD Schema (Agency/Service) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FUTUNO",
      "description": "Elite AI Automation Agency - Automating the Future of Work",
      "url": "https://futuno.ai",
      "logo": "/logo.svg",
      "sameAs": [
        "https://twitter.com/futuno",
        "https://linkedin.com/company/futuno"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Sales",
        "email": "hello@futuno.ai"
      },
      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "USD",
        "lowPrice": "49",
        "highPrice": "999",
        "offerCount": "3"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "AI Automation Services",
        "itemListElement": [
          {
            "@type": "Service",
            "name": "Custom LLM Integration",
            "description": "Integrate powerful language models into your business workflows"
          },
          {
            "@type": "Service",
            "name": "Autonomous Agent Workflows",
            "description": "Build self-operating AI agents that handle complex tasks"
          },
          {
            "@type": "Service",
            "name": "Neural Strategy Consulting",
            "description": "Strategic AI implementation roadmaps for enterprise transformation"
          }
        ]
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
