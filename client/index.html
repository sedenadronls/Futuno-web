<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- SEO Meta Tags -->
    <title>FUTUNO - Advanced AI Solutions for Enterprise</title>
    <meta name="description" content="FUTUNO delivers cutting-edge AI solutions designed for enterprise innovation. Transform your business with intelligent automation and advanced analytics." />
    <meta name="keywords" content="AI solutions, enterprise AI, machine learning, automation, business intelligence" />
    <meta name="author" content="FUTUNO" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    
    <!-- OpenGraph Tags -->
    <meta property="og:title" content="FUTUNO - Advanced AI Solutions for Enterprise" />
    <meta property="og:description" content="Transform your business with cutting-edge AI solutions, intelligent automation, and advanced analytics." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://futuno.manus.space" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="FUTUNO" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FUTUNO - Advanced AI Solutions" />
    <meta name="twitter:description" content="Enterprise AI solutions for innovation and growth." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://futuno.manus.space" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Google Fonts: Poppins (warm, friendly) and Inter (clean, readable) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Structured Data (Schema.org) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FUTUNO",
      "description": "Advanced AI Solutions for Enterprise",
      "url": "https://futuno.manus.space",
      "logo": "/logo.svg",
      "sameAs": [
        "https://twitter.com/futuno",
        "https://linkedin.com/company/futuno"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "email": "hello@futuno.ai"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
